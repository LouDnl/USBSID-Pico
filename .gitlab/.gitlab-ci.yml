# USBSID-Pico GitLab CI/CD Configuration
# Equivalent to all GitHub Actions workflows:
#   - build.yml (dev firmware builds)
#   - buildtools.yml (tools builds)
#   - release.yml (versioned releases)
#   - tagged_build.yml (snapshot prereleases)
#
# Supports two GitLab instances:
#   - gitlab.loudai.nl (private) - Linux runner only
#   - gitlab.com (public) - Linux, macOS, Windows runners

variables:
  BUILD_THREADS: "4"
  BUILD_TYPE: "Release"
  PICO_SDK_REF: "2.2.0"
  PICO_EXTRAS_REF: "sdk-2.2.0"
  PICOTOOL_REF: "2.2.0"
  GIT_SUBMODULE_STRATEGY: recursive

# Pipeline runs on:
# - dev branch: firmware source changes or tools changes
# - master branch: any push
# - Tags: v* for releases, d* for snapshots
# - Manual trigger
workflow:
  rules:
    # Dev branch - firmware source changes
    - if: $CI_COMMIT_BRANCH == "dev" && $CI_PIPELINE_SOURCE == "push"
      changes:
        - src/**
        - lib/**
        - CMakeLists.txt
        - .gitlab/.gitlab-ci.yml
      variables:
        PIPELINE_TYPE: "dev-firmware"
    # Dev branch - tools changes
    - if: $CI_COMMIT_BRANCH == "dev" && $CI_PIPELINE_SOURCE == "push"
      changes:
        - examples/config-tool/**
        - examples/send_sid/**
        - .gitlab/.gitlab-ci.yml
      variables:
        PIPELINE_TYPE: "dev-tools"
    # Master branch push
    - if: $CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE == "push"
      variables:
        PIPELINE_TYPE: "master"
    # Version tags (v0.0.0, v1.0.0-BETA, etc.) - full release
    - if: $CI_COMMIT_TAG =~ /^v(\d|\.|-|[A-Z])+$/
      variables:
        PIPELINE_TYPE: "release"
    # Date tags (d20250101, etc.) - snapshot prerelease
    - if: $CI_COMMIT_TAG =~ /^d[0-9a-z]+$/
      variables:
        PIPELINE_TYPE: "snapshot"
    # Manual trigger
    - if: $CI_PIPELINE_SOURCE == "web"
      variables:
        PIPELINE_TYPE: "manual"
    # Triggered by another pipeline
    - if: $CI_PIPELINE_SOURCE == "pipeline"
    # Force run variable
    - if: $FORCE_RUN == "true"

stages:
  - prepare
  - build-firmware
  - build-tools
  - package
  - release

default:
  interruptible: true

# ============================================================================
# CACHING - Shared SDK/toolchain caches
# ============================================================================

.pico_sdk_cache:
  cache:
    - key: arm-gnu-toolchain-13.2
      paths:
        - arm-gnu-toolchain/
      policy: pull-push
    - key: pico-sdk-${PICO_SDK_REF}
      paths:
        - pico-sdk/
      policy: pull-push
    - key: pico-extras-${PICO_EXTRAS_REF}
      paths:
        - pico-extras/
      policy: pull-push
    - key: picotool-${PICOTOOL_REF}
      paths:
        - picotool/
      policy: pull-push

# ============================================================================
# FIRMWARE BUILD TEMPLATE
# All variants built sequentially in a single job to avoid redundant
# dependency downloads. Dependencies are installed once, then each
# board/emulator/sidplayer combination is built in a loop.
# ============================================================================

.firmware_build_template:
  stage: build-firmware
  image: ubuntu:22.04
  extends: .pico_sdk_cache
  before_script:
    # Install base dependencies (including SID player deps - xa65, bin2h)
    - apt-get update
    - apt-get install -y build-essential cmake ninja-build git python3 python3-pip wget curl xz-utils xa65
    - |
      if [ ! -x "/usr/local/bin/bin2h" ]; then
        git clone --depth 1 https://github.com/elnormous/bin2h.git /tmp/bin2h
        cd /tmp/bin2h && make && cp bin2h /usr/local/bin/ && cd -
      fi
    # Install ARM toolchain (13.2 Rel1 - same as GitHub Actions carlosperate/arm-none-eabi-gcc-action@v1)
    - |
      ARM_GCC_DIR="${CI_PROJECT_DIR}/arm-gnu-toolchain"
      if [ ! -x "${ARM_GCC_DIR}/bin/arm-none-eabi-gcc" ]; then
        wget -q "https://developer.arm.com/-/media/Files/downloads/gnu/13.2.rel1/binrel/arm-gnu-toolchain-13.2.rel1-x86_64-arm-none-eabi.tar.xz" -O /tmp/arm-gcc.tar.xz
        mkdir -p "${ARM_GCC_DIR}"
        tar xf /tmp/arm-gcc.tar.xz -C "${ARM_GCC_DIR}" --strip-components=1
        rm /tmp/arm-gcc.tar.xz
      fi
    - export PATH="${CI_PROJECT_DIR}/arm-gnu-toolchain/bin:${PATH}"
    - arm-none-eabi-gcc --version
    # Clone/update Pico SDK if not cached
    - |
      if [ ! -d "pico-sdk" ]; then
        git clone --depth 1 --branch ${PICO_SDK_REF} --recurse-submodules https://github.com/raspberrypi/pico-sdk.git pico-sdk
      fi
    - export PICO_SDK_PATH=$(pwd)/pico-sdk
    # Get TinyUSB deps for both platforms
    - cd pico-sdk/lib/tinyusb && python3 tools/get_deps.py rp2040 && python3 tools/get_deps.py rp2350-arm-s && cd -
    # Clone/update Pico Extras if not cached
    - |
      if [ ! -d "pico-extras" ]; then
        git clone --depth 1 --branch ${PICO_EXTRAS_REF} --recurse-submodules https://github.com/raspberrypi/pico-extras.git pico-extras
      fi
    - export PICO_EXTRAS_PATH=$(pwd)/pico-extras
    # Build picotool if not cached
    - |
      if [ ! -d "picotool" ]; then
        git clone --depth 1 --branch ${PICOTOOL_REF} --recurse-submodules https://github.com/raspberrypi/picotool.git picotool-src
        cmake -S picotool-src -B picotool-src/build -DCMAKE_INSTALL_PREFIX=$(pwd)/picotool -DPICOTOOL_FLAT_INSTALL=1
        cmake --build picotool-src/build -j${BUILD_THREADS} --target install
        rm -rf picotool-src
      fi
    # Clone optional libraries (needed by emulator and sidplayer variants)
    - git clone --depth 1 https://github.com/loudnl/emudore-embedded.git lib/emudore-embedded
    - git clone --depth 1 https://github.com/loudnl/usbsid-player.git lib/usbsid-player
  script:
    - mkdir -p dist
    - |
      build_variant() {
        local dir="$1" board="$2" platform="$3" emulator="$4" sidplayer="$5"
        echo ""
        echo "================================================================"
        echo "Building: ${dir} (board=${board} platform=${platform} emulator=${emulator} sidplayer=${sidplayer})"
        echo "================================================================"
        mkdir -p "build_${dir}"
        cmake -S . -B "build_${dir}" \
          -DCMAKE_BUILD_TYPE=${BUILD_TYPE} \
          -DPICO_PLATFORM="${platform}" \
          -DPICO_BOARD="${board}" \
          -Dpicotool_DIR="$(pwd)/picotool/picotool" \
          -DONBOARD_EMULATOR="${emulator}" \
          -DONBOARD_SIDPLAYER="${sidplayer}"
        cmake --build "build_${dir}" --config ${BUILD_TYPE} -j${BUILD_THREADS}
        ls -la "build_${dir}"/*.uf2
        cp -v "build_${dir}"/*.uf2 dist/
        rm -rf "build_${dir}"
      }
    # Base builds
    - build_variant pico       pico    rp2040       0 0
    - build_variant picow      pico_w  rp2040       0 0
    - build_variant pico2      pico2   rp2350-arm-s 0 0
    - build_variant pico2w     pico2_w rp2350-arm-s 0 0
    # Emulator builds
    - build_variant pico_em    pico    rp2040       1 0
    - build_variant pico_w_em  pico_w  rp2040       1 0
    - build_variant pico2_em   pico2   rp2350-arm-s 1 0
    - build_variant pico2_w_em pico2_w rp2350-arm-s 1 0
    # SID player builds
    - build_variant pico2_sp   pico2   rp2350-arm-s 0 1
    - build_variant pico2_w_sp pico2_w rp2350-arm-s 0 1
    # Summary
    - echo "All builds complete. Artifacts:"
    - ls -la dist/

# ============================================================================
# DEV FIRMWARE BUILD (build.yml equivalent)
# Single job builds all 10 variants sequentially
# ============================================================================

firmware:all:
  extends: .firmware_build_template
  artifacts:
    name: "usbsid-firmware-${CI_COMMIT_REF_SLUG}-${CI_PIPELINE_IID}"
    paths:
      - dist/*.uf2
    expire_in: 1 week
  rules:
    - if: $PIPELINE_TYPE == "dev-firmware" || $PIPELINE_TYPE == "manual"

# ============================================================================
# RELEASE FIRMWARE BUILD (release.yml equivalent)
# Same as dev but triggered on version/date tags, longer artifact retention
# ============================================================================

release:firmware:all:
  extends: .firmware_build_template
  artifacts:
    name: "releasebuild-usbsid-firmware"
    paths:
      - dist/*.uf2
    expire_in: 4 weeks
  rules:
    - if: $PIPELINE_TYPE == "release" || $PIPELINE_TYPE == "snapshot"

# ============================================================================
# TOOLS BUILD TEMPLATES (buildtools.yml equivalent)
# ============================================================================

.tools_ubuntu_template:
  stage: build-tools
  image: ubuntu:latest
  before_script:
    - apt-get update
    - apt-get install -y pkg-config cmake build-essential libusb-1.0-0 libusb-1.0-0-dev
  script:
    - cd examples/${DIRECTORY}
    - ls -lhai
    - rm ${BUILDNAME} || true
    - cmake -S . -B build -DEXECUTABLE=${BUILDNAME}
    - cmake --build build -j$(nproc)
    - ls -lhai
  artifacts:
    name: "tools-${BUILDNAME}-linux"
    paths:
      - examples/${DIRECTORY}/${BUILDNAME}
    expire_in: 1 week

.tools_windows_template:
  stage: build-tools
  tags:
    - saas-windows-medium-amd64 # gitlab.com SaaS Windows runner
  before_script:
    - choco install msys2 -y --no-progress
    - refreshenv
    - C:\tools\msys64\usr\bin\bash -lc "pacman -Syu --noconfirm"
    - C:\tools\msys64\usr\bin\bash -lc "pacman -S --noconfirm --needed mingw-w64-x86_64-gcc mingw-w64-x86_64-libusb mingw-w64-x86_64-cmake mingw-w64-x86_64-pkg-config mingw-w64-x86_64-ninja"
  script:
    - C:\tools\msys64\usr\bin\bash -lc "cd '${CI_PROJECT_DIR}/examples/${DIRECTORY}' && rm -f ${BUILDNAME}.exe && cmake -S . -B build -DEXECUTABLE=${BUILDNAME} && cmake --build build -j$(nproc)"
  artifacts:
    name: "tools-${BUILDNAME}-windows"
    paths:
      - examples/${DIRECTORY}/${BUILDNAME}.exe
      - examples/${DIRECTORY}/*.dll
    expire_in: 1 week

.tools_macos_template:
  stage: build-tools
  before_script:
    - brew update
    - brew install pkg-config cmake ninja libusb
  script:
    - cd examples/${DIRECTORY}
    - ls -lhai
    - rm ${BUILDNAME} || true
    - cmake -S . -B build -DEXECUTABLE=${BUILDNAME}
    - cmake --build build -j$(sysctl -n hw.ncpu)
    - ls -lhai
  artifacts:
    name: "tools-${BUILDNAME}-macos-${MACOS_VERSION}"
    paths:
      - examples/${DIRECTORY}/${BUILDNAME}
    expire_in: 1 week

